name: SonarQube Scan

on:
  schedule:
    - cron: '15 3,15 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual SonarQube scan'

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  SONAR_HOST_URL: https://sonarqube.mapup.ai

jobs:
  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log manual run reason
        if: github.event_name == 'workflow_dispatch'
        run: echo "Manual trigger - ${{ github.event.inputs.reason }}"

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mapup-osm-bridge-editor
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**
            -Dsonar.python.coverage.reportPaths=**/coverage.xml
