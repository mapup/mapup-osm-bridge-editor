name: SonarQube Scan

on:
  schedule:
    - cron: '15 3,15 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual SonarQube scan'

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  SONAR_HOST_URL: https://sonarqube.mapup.ai

jobs:
  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log manual run reason
        if: github.event_name == 'workflow_dispatch'
        run: echo "Manual trigger - ${{ github.event.inputs.reason }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        continue-on-error: true
        run: pytest

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mapup-osm-bridge-editor
            -Dsonar.sources=.
            -Dsonar.tests=tests
            -Dsonar.test.inclusions=tests/**
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,tests/**
            -Dsonar.python.coverage.reportPaths=coverage.xml

      - name: Update project sheet tab
        continue-on-error: true
        run: |
          sleep 120
          RESPONSE=$(curl -s -L \
            "${{ secrets.APPS_SCRIPT_WEB_APP_URL }}?project=mapup-osm-bridge-editor")
          echo "Sheet update response: $RESPONSE"
          if [ "$RESPONSE" = "ok" ]; then
            echo "✅ Sheet updated successfully"
          else
            echo "⚠️ Sheet update may have failed: $RESPONSE"
          fi
